<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIS — Dual Astrology Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --cream: #F5F0E8;
    --dark: #0A0A0F;
    --mid: #12121A;
    --surface: #1A1A26;
    --surface2: #222235;
    --tropical: #7B9FE0;
    --sidereal: #E07B9F;
    --synthesis: #C9A84C;
    --text: #D4CFC6;
    --text-dim: #7A7870;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARFIELD */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: var(--o, 0.4);
  }

  @keyframes twinkle {
    0%, 100% { opacity: var(--o, 0.4); transform: scale(1); }
    50% { opacity: calc(var(--o, 0.4) * 0.3); transform: scale(0.7); }
  }

  /* LAYOUT */
  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 60px 0 40px;
    position: relative;
  }

  .logo-symbol {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
    animation: slowRotate 40s linear infinite;
    display: inline-block;
  }

  @keyframes slowRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 8px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .tagline {
    font-size: 32px;
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    line-height: 1.2;
  }

  .tagline span {
    color: var(--gold);
  }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 2px;
    padding: 40px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  input, select {
    background: var(--surface2);
    border: 1px solid rgba(201, 168, 76, 0.15);
    border-radius: 1px;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.3s;
    width: 100%;
  }

  input:focus, select:focus {
    border-color: rgba(201, 168, 76, 0.6);
  }

  select option { background: var(--surface2); }

  .btn-generate {
    width: 100%;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 18px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .btn-generate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .btn-generate:hover::before { transform: scaleX(1); }
  .btn-generate:hover { color: var(--dark); }
  .btn-generate span { position: relative; z-index: 1; }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-generate:disabled::before { display: none; }

  /* LOADING */
  .loading {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .loading.active { display: block; }

  .orbital {
    width: 80px;
    height: 80px;
    margin: 0 auto 30px;
    position: relative;
  }

  .orbital-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid transparent;
  }

  .orbital-ring:nth-child(1) {
    border-top-color: var(--tropical);
    animation: spin 2s linear infinite;
  }

  .orbital-ring:nth-child(2) {
    inset: 10px;
    border-right-color: var(--sidereal);
    animation: spin 3s linear infinite reverse;
  }

  .orbital-ring:nth-child(3) {
    inset: 20px;
    border-bottom-color: var(--gold);
    animation: spin 1.5s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-style: italic;
    font-size: 20px;
    color: var(--text-dim);
  }

  .loading-phase {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-top: 8px;
    min-height: 20px;
  }

  /* RESULTS */
  .results { display: none; }
  .results.active { display: block; }

  /* CHART HEADER */
  .chart-header {
    text-align: center;
    padding: 40px 0 30px;
    border-bottom: 1px solid rgba(201, 168, 76, 0.15);
    margin-bottom: 40px;
  }

  .chart-name {
    font-size: 48px;
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    margin-bottom: 4px;
  }

  .chart-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }

  /* PLANET TABLE */
  .planet-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: rgba(201, 168, 76, 0.1);
    border: 1px solid rgba(201, 168, 76, 0.1);
    margin-bottom: 40px;
  }

  .planet-cell {
    background: var(--surface);
    padding: 16px;
    position: relative;
  }

  .planet-cell:hover { background: var(--surface2); }

  .planet-name {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .planet-tropical {
    font-size: 15px;
    color: var(--tropical);
    margin-bottom: 2px;
  }

  .planet-sidereal {
    font-size: 15px;
    color: var(--sidereal);
  }

  .planet-symbol {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 20px;
    opacity: 0.3;
  }

  /* READING SECTIONS */
  .reading-section {
    margin-bottom: 48px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .reading-section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(201, 168, 76, 0.1);
  }

  .section-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-dot.tropical { background: var(--tropical); }
  .section-dot.sidereal { background: var(--sidereal); }
  .section-dot.synthesis { background: var(--gold); }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    flex: 1;
  }

  .section-label.tropical { color: var(--tropical); }
  .section-label.sidereal { color: var(--sidereal); }
  .section-label.synthesis { color: var(--gold); }

  .section-title {
    font-size: 28px;
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    margin-bottom: 20px;
  }

  .reading-content {
    font-size: 18px;
    line-height: 1.8;
    color: var(--text);
    font-weight: 300;
  }

  .reading-content p {
    margin-bottom: 16px;
  }

  .reading-content strong {
    color: var(--cream);
    font-weight: 600;
  }

  .reading-content em {
    color: var(--gold-light);
    font-style: italic;
  }

  /* SYNTHESIS SPECIAL */
  .synthesis-card {
    background: var(--surface);
    border: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 2px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  .synthesis-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top right, rgba(201, 168, 76, 0.05), transparent 60%);
    pointer-events: none;
  }

  /* CONVERGENCE MARKERS */
  .signal-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .signal-row:last-child { border-bottom: none; }

  .signal-tropical {
    font-size: 15px;
    color: var(--tropical);
    text-align: right;
  }

  .signal-sidereal {
    font-size: 15px;
    color: var(--sidereal);
  }

  .signal-connector {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    text-align: center;
  }

  .signal-connector.agree {
    background: rgba(201, 168, 76, 0.15);
    color: var(--gold);
    border: 1px solid rgba(201, 168, 76, 0.3);
  }

  .signal-connector.tension {
    background: rgba(255, 120, 120, 0.1);
    color: #FF9090;
    border: 1px solid rgba(255, 120, 120, 0.2);
  }

  /* ASPECT PILLS */
  .aspect-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0;
  }

  .aspect-pill {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid;
  }

  .aspect-pill.conjunction { border-color: rgba(123, 159, 224, 0.4); color: var(--tropical); }
  .aspect-pill.trine { border-color: rgba(201, 168, 76, 0.4); color: var(--gold); }
  .aspect-pill.opposition { border-color: rgba(224, 123, 159, 0.4); color: var(--sidereal); }
  .aspect-pill.square { border-color: rgba(255, 150, 100, 0.4); color: #FF9664; }
  .aspect-pill.sextile { border-color: rgba(100, 200, 180, 0.4); color: #64C8B4; }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 40px 0;
    color: var(--text-dim);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201, 168, 76, 0.1);
  }

  /* ERROR */
  .error-msg {
    background: rgba(255, 100, 100, 0.1);
    border: 1px solid rgba(255, 100, 100, 0.3);
    color: #FF9090;
    padding: 16px 20px;
    font-size: 16px;
    margin-top: 16px;
    display: none;
  }

  .error-msg.active { display: block; }

  /* AUTOCOMPLETE */
  .autocomplete-wrapper { position: relative; }

  .autocomplete-dropdown {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-top: none;
    z-index: 100;
    max-height: 220px;
    overflow-y: auto;
    display: none;
  }

  .autocomplete-dropdown.open { display: block; }

  .autocomplete-item {
    padding: 11px 16px;
    font-size: 16px;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.active {
    background: rgba(201, 168, 76, 0.1);
    color: var(--cream);
  }

  .autocomplete-item .city-flag {
    font-size: 18px;
    flex-shrink: 0;
  }

  .autocomplete-item .city-info { display: flex; flex-direction: column; }
  .autocomplete-item .city-name { font-size: 16px; }
  .autocomplete-item .city-country {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .autocomplete-loading {
    padding: 12px 16px;
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .planet-grid { grid-template-columns: repeat(2, 1fr); }
    .form-card { padding: 24px; }
    .tagline { font-size: 24px; }
  }

  /* TYPEWRITER EFFECT */
  .typewriter { border-right: 2px solid var(--gold); animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { border-color: transparent; } }

  /* SCROLL REVEAL */
  .reveal { opacity: 1; transform: none; transition: all 0.7s ease; }
  .reveal.in { opacity: 1; transform: none; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="container">
  <header>
    <span class="logo-symbol">✦</span>
    <h1>AXIS</h1>
    <div class="tagline">Where <span>two skies</span> tell one truth</div>
  </header>

  <div class="form-card reveal" id="formCard">
    <div class="form-grid">
      <div class="form-group full">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Paste your key from aistudio.google.com" />
      </div>
      <div class="form-group full">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="dob" />
      </div>
      <div class="form-group">
        <label>Time of Birth</label>
        <input type="time" id="tob" />
      </div>
      <div class="form-group full">
        <label>Place of Birth</label>
        <div class="autocomplete-wrapper">
          <input type="text" id="pob" placeholder="Start typing a city..." autocomplete="off" oninput="handleCityInput(this.value)" onkeydown="handleCityKeydown(event)" onfocus="if(this.value.length>=2) openDropdown()" onblur="setTimeout(closeDropdown, 200)" />
          <div class="autocomplete-dropdown" id="cityDropdown"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Ayanamsa (Sidereal)</label>
        <select id="ayanamsa">
          <option value="Lahiri">Lahiri (Standard Vedic)</option>
          <option value="Raman">Raman</option>
          <option value="Krishnamurti">Krishnamurti (KP)</option>
          <option value="Fagan-Bradley">Fagan-Bradley (Western Sidereal)</option>
          <option value="Yukteshwar">Yukteshwar</option>
        </select>
      </div>
      <div class="form-group">
        <label>House System</label>
        <select id="houseSystem">
          <option value="Placidus">Placidus</option>
          <option value="Whole Sign" selected>Whole Sign</option>
          <option value="Koch">Koch</option>
          <option value="Equal House">Equal House</option>
          <option value="Porphyry">Porphyry</option>
        </select>
      </div>
    </div>
    <button class="btn-generate" id="generateBtn" onclick="generateChart()">
      <span>Cast the Chart</span>
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="loading" id="loading">
    <div class="orbital">
      <div class="orbital-ring"></div>
      <div class="orbital-ring"></div>
      <div class="orbital-ring"></div>
    </div>
    <div class="loading-text">Reading the celestial record</div>
    <div class="loading-phase" id="loadingPhase">Calculating planetary positions...</div>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
// STARFIELD
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = Array.from({length: 180}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.2,
  o: Math.random() * 0.5 + 0.1,
  d: Math.random() * 4 + 2
}));

let t = 0;
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  t += 0.01;
  stars.forEach(s => {
    const o = s.o * (0.5 + 0.5 * Math.sin(t / s.d + s.x));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${o})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Scroll reveal
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// PLANET SYMBOLS
const planetSymbols = {
  'Sun': '☉', 'Moon': '☽', 'Mercury': '☿', 'Venus': '♀', 'Mars': '♂',
  'Jupiter': '♃', 'Saturn': '♄', 'Uranus': '♅', 'Neptune': '♆', 'Pluto': '♇',
  'Ascendant': 'AC', 'Midheaven': 'MC', 'North Node': '☊', 'Chiron': '⚷'
};

// LOADING PHASES
const phases = [
  "Calculating planetary positions...",
  "Mapping Tropical zodiac...",
  "Applying Sidereal ayanamsa...",
  "Computing house cusps...",
  "Identifying aspects & dignities...",
  "Weaving the Tropical reading...",
  "Channeling the Vedic interpretation...",
  "Finding convergence & tension...",
  "Synthesizing your cosmic blueprint..."
];

function cyclePhases() {
  let i = 0;
  return setInterval(() => {
    document.getElementById('loadingPhase').textContent = phases[i % phases.length];
    i++;
  }, 2200);
}

async function generateChart() {
  const name = document.getElementById('name').value.trim();
  const dob = document.getElementById('dob').value;
  const tob = document.getElementById('tob').value;
  const pob = document.getElementById('pob').value.trim();
  const ayanamsa = document.getElementById('ayanamsa').value;
  const houseSystem = document.getElementById('houseSystem').value;
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.classList.remove('active');

  const apiKey = document.getElementById('apiKey').value.trim();

  if (!apiKey) {
    errorMsg.textContent = 'Please enter your Gemini API key. Get one free at aistudio.google.com';
    errorMsg.classList.add('active');
    return;
  }

  if (!name || !dob || !tob || !pob) {
    errorMsg.textContent = 'Please fill in all fields to cast your chart.';
    errorMsg.classList.add('active');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;

  document.getElementById('loading').classList.add('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('results').innerHTML = '';

  const phaseInterval = cyclePhases();

  const date = new Date(dob);
  const [year, month, day] = [date.getFullYear(), date.getMonth() + 1, date.getDate()];
  const [hour, minute] = tob.split(':').map(Number);

  // Build the mega-prompt
  const systemPrompt = `You are AXIS, the world's most sophisticated dual-system astrologer. You have mastered both Western Tropical astrology and Vedic Jyotish (Sidereal) at the highest level. You speak with authority, depth, and poetic precision. You do NOT give generic horoscope-style platitudes. Every statement you make is grounded in the specific planetary positions, aspects, and house placements provided.

You will receive birth data and your job is to:
1. Calculate approximate planetary positions (use your knowledge of ephemeris and typical planetary speeds — be specific with degrees and signs)
2. Apply the ${ayanamsa} ayanamsa (~23.5° difference) to produce Sidereal positions  
3. Identify key aspects (conjunctions, trines, squares, oppositions, sextiles within 8° orb)
4. Generate three layered readings

Your output MUST be valid JSON matching this exact structure:
{
  "planets": [
    {"name": "Sun", "tropical": "14° Aries", "sidereal": "21° Pisces", "house_tropical": "1st", "house_sidereal": "12th"},
    ... (include Sun, Moon, Mercury, Venus, Mars, Jupiter, Saturn, Uranus, Neptune, Pluto, Ascendant, Midheaven, North Node)
  ],
  "aspects_tropical": [
    {"planets": "Sun conjunct Mercury", "type": "conjunction", "orb": "3°", "meaning": "brief specific meaning"},
    ... (list all significant aspects)
  ],
  "aspects_sidereal": [
    {"planets": "Sun trine Moon", "type": "trine", "orb": "2°", "meaning": "brief specific meaning"},
    ...
  ],
  "signals": [
    {"tropical_statement": "Sun in Aries: bold, pioneering identity", "sidereal_statement": "Sun in Pisces: deep spiritual undercurrent", "relationship": "tension"},
    {"tropical_statement": "Moon in Scorpio: intense emotional processing", "sidereal_statement": "Moon in Scorpio: same placement — emotional depth confirmed", "relationship": "agree"},
    ... (6-8 key signal comparisons)
  ],
  "tropical_reading": {
    "title": "The Self You Project",
    "content": "Full rich reading (600+ words) in flowing paragraphs. Reference SPECIFIC placements. Talk about Sun sign, Moon sign, Rising, key aspects, what this person is here to express in this lifetime. Make it feel like the most accurate reading they've ever received. Use **bold** for key phrases and *italics* for emphasis. Start with an arresting opening statement."
  },
  "sidereal_reading": {
    "title": "The Soul Beneath the Surface",
    "content": "Full rich reading (600+ words) using Vedic/Jyotish framework. Reference nakshaktras where relevant. Discuss karma, dharma, past life patterns, soul contracts. Reference the Sidereal positions specifically. Talk about yogas if any exist. Use **bold** and *italics*. Make it feel revelatory — like they're seeing themselves from outside time."
  },
  "synthesis": {
    "title": "Where Both Skies Meet",
    "convergence_intro": "2-3 sentences introducing what the two systems agree on",
    "tension_intro": "2-3 sentences introducing where interesting tension lives",
    "content": "The full synthesis reading (700+ words). This is the crown jewel. Explain HOW these two systems together reveal something NEITHER could show alone. Point to specific convergences as confirmed truths. Treat divergences not as contradictions but as different layers of the same person — the Tropical showing who you're becoming, the Sidereal showing what you carry. End with a powerful statement about this person's path. Use **bold** and *italics* liberally. Make the final paragraph unforgettable."
  }
}

Output ONLY the JSON. No preamble. No markdown code fences. Just raw JSON.`;

  const userPrompt = `Cast a full dual-system birth chart for:

Name: ${name}
Date of Birth: ${day} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][month-1]} ${year}
Time of Birth: ${hour}:${minute < 10 ? '0'+minute : minute} (local time)
Place of Birth: ${pob}
Ayanamsa: ${ayanamsa}
House System: ${houseSystem}

Calculate precise planetary positions for this date using your ephemeris knowledge. Apply the ${ayanamsa} ayanamsa (subtract ~23°20' for current era) to get Sidereal positions. Generate the full three-layer reading with the depth and specificity this person deserves.`;

  try {
    const fullPrompt = systemPrompt + "\n\nUSER REQUEST:\n" + userPrompt;

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: fullPrompt }] }],
          generationConfig: {
            temperature: 0.9,
            maxOutputTokens: 8192
          }
        })
      }
    );

    clearInterval(phaseInterval);

    if (!response.ok) {
      const errData = await response.json();
      throw new Error(errData.error?.message || `API error: ${response.status}`);
    }

    const data = await response.json();
    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

    if (!rawText) throw new Error('Empty response from Gemini');

    let chartData;
    try {
      const clean = rawText.replace(/```json|```/g, '').trim();
      chartData = JSON.parse(clean);
    } catch(e) {
      const match = rawText.match(/\{[\s\S]*\}/);
      if (match) {
        chartData = JSON.parse(match[0]);
      } else {
        throw new Error('Could not parse chart data — please try again');
      }
    }

    renderResults(name, dob, tob, pob, ayanamsa, houseSystem, chartData);

  } catch (err) {
    clearInterval(phaseInterval);
    document.getElementById('loading').classList.remove('active');
    errorMsg.textContent = `Something went wrong: ${err.message}. Please try again.`;
    errorMsg.classList.add('active');
    btn.disabled = false;
  }
}

function parseMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function renderResults(name, dob, tob, pob, ayanamsa, houseSystem, data) {
  document.getElementById('loading').classList.remove('active');

  const dobFormatted = new Date(dob).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'});

  let html = `
    <div class="chart-header reveal in">
      <div class="chart-name">${name}</div>
      <div class="chart-meta">${dobFormatted} · ${tob} · ${pob}<br>${houseSystem} Houses · ${ayanamsa} Ayanamsa</div>
    </div>

    <div class="reading-section visible" style="transition-delay:0.1s">
      <div class="section-header">
        <div class="section-dot tropical"></div>
        <div class="section-label tropical">Planetary Positions</div>
      </div>
      <div class="planet-grid">
  `;

  (data.planets || []).forEach(p => {
    html += `
      <div class="planet-cell">
        <div class="planet-symbol">${planetSymbols[p.name] || '·'}</div>
        <div class="planet-name">${p.name}</div>
        <div class="planet-tropical">♊ ${p.tropical} · H${p.house_tropical || '?'}</div>
        <div class="planet-sidereal">♊ ${p.sidereal} · H${p.house_sidereal || '?'}</div>
      </div>
    `;
  });

  html += `</div>`;

  // Aspects
  if (data.aspects_tropical && data.aspects_tropical.length) {
    html += `
      <div class="section-header" style="margin-top:32px">
        <div class="section-dot tropical"></div>
        <div class="section-label tropical">Key Aspects</div>
      </div>
      <div class="aspect-pills">
    `;
    data.aspects_tropical.forEach(a => {
      html += `<div class="aspect-pill ${a.type}" title="${a.meaning}">${a.planets} (${a.orb})</div>`;
    });
    html += `</div>`;
  }

  html += `</div><div class="divider">✦</div>`;

  // TROPICAL READING
  html += `
    <div class="reading-section" id="sec-tropical">
      <div class="section-header">
        <div class="section-dot tropical"></div>
        <div class="section-label tropical">Western Tropical — The Psychological Self</div>
      </div>
      <div class="section-title">${data.tropical_reading?.title || 'The Self You Project'}</div>
      <div class="reading-content"><p>${parseMarkdown(data.tropical_reading?.content || '')}</p></div>
    </div>

    <div class="divider">✦</div>
  `;

  // SIDEREAL READING
  html += `
    <div class="reading-section" id="sec-sidereal">
      <div class="section-header">
        <div class="section-dot sidereal"></div>
        <div class="section-label sidereal">Vedic Sidereal — The Karmic Soul</div>
      </div>
      <div class="section-title">${data.sidereal_reading?.title || 'The Soul Beneath'}</div>
      <div class="reading-content"><p>${parseMarkdown(data.sidereal_reading?.content || '')}</p></div>
    </div>

    <div class="divider">✦</div>
  `;

  // SIGNALS
  if (data.signals && data.signals.length) {
    html += `
      <div class="reading-section" id="sec-signals">
        <div class="section-header">
          <div class="section-dot synthesis"></div>
          <div class="section-label synthesis">Signal Analysis — Where the Systems Speak</div>
        </div>
        <div style="display:grid;grid-template-columns:auto;gap:0">
          <div class="signal-row" style="padding-bottom:8px;margin-bottom:4px">
            <div style="text-align:right;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--tropical)">TROPICAL</div>
            <div></div>
            <div style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--sidereal)">SIDEREAL</div>
          </div>
    `;
    data.signals.forEach(s => {
      html += `
        <div class="signal-row">
          <div class="signal-tropical">${s.tropical_statement}</div>
          <div class="signal-connector ${s.relationship}">${s.relationship === 'agree' ? 'CONFIRMS' : 'TENSION'}</div>
          <div class="signal-sidereal">${s.sidereal_statement}</div>
        </div>
      `;
    });
    html += `</div></div><div class="divider">✦</div>`;
  }

  // SYNTHESIS
  html += `
    <div class="reading-section" id="sec-synthesis">
      <div class="section-header">
        <div class="section-dot synthesis"></div>
        <div class="section-label synthesis">The Synthesis — Your Complete Picture</div>
      </div>
      <div class="section-title">${data.synthesis?.title || 'Where Both Skies Meet'}</div>
      <div class="synthesis-card">
        ${data.synthesis?.convergence_intro ? `<div class="reading-content" style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(201,168,76,0.1)"><p>${parseMarkdown(data.synthesis.convergence_intro)}</p></div>` : ''}
        <div class="reading-content"><p>${parseMarkdown(data.synthesis?.content || '')}</p></div>
      </div>
    </div>

    <div style="text-align:center;padding:60px 0 20px">
      <div style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:4px;color:var(--text-dim)">AXIS · DUAL ASTROLOGY INTELLIGENCE</div>
      <button onclick="resetForm()" style="margin-top:24px;background:transparent;border:1px solid rgba(201,168,76,0.3);color:var(--text-dim);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:12px 24px;cursor:pointer;transition:all 0.3s" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='rgba(201,168,76,0.3)';this.style.color='var(--text-dim)'">Cast Another Chart</button>
    </div>
  `;

  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = html;
  resultsEl.classList.add('active');

  // Scroll and animate sections
  setTimeout(() => {
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    const sections = resultsEl.querySelectorAll('.reading-section');
    sections.forEach((s, i) => {
      setTimeout(() => {
        s.classList.add('visible');
      }, i * 200);
    });
  }, 100);

  document.getElementById('generateBtn').disabled = false;
}

function resetForm() {
  document.getElementById('results').classList.remove('active');
  document.getElementById('results').innerHTML = '';
  document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('generateBtn').disabled = false;
}

// Reveal on load
setTimeout(() => {
  document.querySelector('.reveal').classList.add('in');
}, 200);

// CITY AUTOCOMPLETE (uses Open-Meteo Geocoding — free, no key needed)
let cityDebounce = null;
let cityResults = [];
let activeIndex = -1;

async function handleCityInput(val) {
  clearTimeout(cityDebounce);
  activeIndex = -1;
  if (val.length < 2) { closeDropdown(); return; }
  cityDebounce = setTimeout(() => fetchCities(val), 300);
}

async function fetchCities(query) {
  const dropdown = document.getElementById('cityDropdown');
  dropdown.innerHTML = '<div class="autocomplete-loading">Searching...</div>';
  dropdown.classList.add('open');

  try {
    // Nominatim (OpenStreetMap) — suburb-level global coverage, no API key needed
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=7&addressdetails=1&featuretype=settlement`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const data = await res.json();
    cityResults = data || [];
    renderCityDropdown(cityResults);
  } catch(e) {
    dropdown.innerHTML = '<div class="autocomplete-loading">Could not fetch cities — type the full name manually</div>';
  }
}

function renderCityDropdown(results) {
  const dropdown = document.getElementById('cityDropdown');
  if (!results.length) {
    dropdown.innerHTML = '<div class="autocomplete-loading">No results — try adding the country (e.g. "Epping, Australia")</div>';
    return;
  }
  dropdown.innerHTML = results.map((r, i) => {
    const addr = r.address || {};
    const countryCode = addr.country_code ? addr.country_code.toUpperCase() : '';
    const flag = countryCode ? getFlagEmoji(countryCode) : '🌍';
    // Build a clean display name from address parts
    const primary = addr.suburb || addr.town || addr.village || addr.city || addr.county || r.name;
    const parts = [addr.state || addr.region, addr.country].filter(Boolean);
    const secondary = parts.join(', ');
    return `<div class="autocomplete-item" data-index="${i}" onmousedown="selectCity(${i})">
      <span class="city-flag">${flag}</span>
      <div class="city-info">
        <span class="city-name">${primary}</span>
        <span class="city-country">${secondary}</span>
      </div>
    </div>`;
  }).join('');
  dropdown.classList.add('open');
}

function selectCity(index) {
  const r = cityResults[index];
  if (!r) return;
  const addr = r.address || {};
  const primary = addr.suburb || addr.town || addr.village || addr.city || addr.county || r.name;
  const parts = [addr.state || addr.region, addr.country].filter(Boolean);
  document.getElementById('pob').value = [primary, ...parts].join(', ');
  closeDropdown();
}

function handleCityKeydown(e) {
  const dropdown = document.getElementById('cityDropdown');
  const items = dropdown.querySelectorAll('.autocomplete-item');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIndex = Math.min(activeIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIndex = Math.max(activeIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
  } else if (e.key === 'Enter' && activeIndex >= 0) {
    e.preventDefault();
    selectCity(activeIndex);
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
}

function openDropdown() {
  if (cityResults.length) document.getElementById('cityDropdown').classList.add('open');
}

function closeDropdown() {
  document.getElementById('cityDropdown').classList.remove('open');
}

function getFlagEmoji(countryCode) {
  return countryCode.toUpperCase().replace(/./g, c =>
    String.fromCodePoint(127397 + c.charCodeAt(0))
  );
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.autocomplete-wrapper')) closeDropdown();
});
</script>
