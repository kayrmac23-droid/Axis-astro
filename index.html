<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIS — Dual Astrology Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --cream: #F5F0E8;
    --dark: #0A0A0F;
    --mid: #12121A;
    --surface: #1A1A26;
    --surface2: #222235;
    --tropical: #7B9FE0;
    --sidereal: #E07B9F;
    --synthesis: #C9A84C;
    --text: #D4CFC6;
    --text-dim: #7A7870;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARFIELD */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: var(--o, 0.4);
  }

  @keyframes twinkle {
    0%, 100% { opacity: var(--o, 0.4); transform: scale(1); }
    50% { opacity: calc(var(--o, 0.4) * 0.3); transform: scale(0.7); }
  }

  /* LAYOUT */
  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 60px 0 40px;
    position: relative;
  }

  .logo-symbol {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
    animation: slowRotate 40s linear infinite;
    display: inline-block;
  }

  @keyframes slowRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 8px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .tagline {
    font-size: 32px;
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    line-height: 1.2;
  }

  .tagline span {
    color: var(--gold);
  }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 2px;
    padding: 40px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  input, select {
    background: var(--surface2);
    border: 1px solid rgba(201, 168, 76, 0.15);
    border-radius: 1px;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.3s;
    width: 100%;
  }

  input:focus, select:focus {
    border-color: rgba(201, 168, 76, 0.6);
  }

  select option { background: var(--surface2); }

  .btn-generate {
    width: 100%;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 18px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .btn-generate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .btn-generate:hover::before { transform: scaleX(1); }
  .btn-generate:hover { color: var(--dark); }
  .btn-generate span { position: relative; z-index: 1; }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-generate:disabled::before { display: none; }

  /* LOADING */
  .loading {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .loading.active { display: block; }

  .orbital {
    width: 80px;
    height: 80px;
    margin: 0 auto 30px;
    position: relative;
  }

  .orbital-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid transparent;
  }

  .orbital-ring:nth-child(1) {
    border-top-color: var(--tropical);
    animation: spin 2s linear infinite;
  }

  .orbital-ring:nth-child(2) {
    inset: 10px;
    border-right-color: var(--sidereal);
    animation: spin 3s linear infinite reverse;
  }

  .orbital-ring:nth-child(3) {
    inset: 20px;
    border-bottom-color: var(--gold);
    animation: spin 1.5s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-style: italic;
    font-size: 20px;
    color: var(--text-dim);
  }

  .loading-phase {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-top: 8px;
    min-height: 20px;
  }

  /* RESULTS */
  .results { display: none; }
  .results.active { display: block; }

  /* CHART HEADER */
  .chart-header {
    text-align: center;
    padding: 40px 0 30px;
    border-bottom: 1px solid rgba(201, 168, 76, 0.15);
    margin-bottom: 40px;
  }

  .chart-name {
    font-size: 48px;
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    margin-bottom: 4px;
  }

  .chart-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }

  /* PLANET TABLE */
  .planet-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: rgba(201, 168, 76, 0.1);
    border: 1px solid rgba(201, 168, 76, 0.1);
    margin-bottom: 40px;
  }

  .planet-cell {
    background: var(--surface);
    padding: 16px;
    position: relative;
  }

  .planet-cell:hover { background: var(--surface2); }

  .planet-name {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .planet-tropical {
    font-size: 15px;
    color: var(--tropical);
    margin-bottom: 2px;
  }

  .planet-sidereal {
    font-size: 15px;
    color: var(--sidereal);
  }

  .planet-symbol {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 20px;
    opacity: 0.3;
  }

  /* READING SECTIONS */
  .reading-section {
    margin-bottom: 48px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .reading-section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(201, 168, 76, 0.1);
  }

  .section-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-dot.tropical { background: var(--tropical); }
  .section-dot.sidereal { background: var(--sidereal); }
  .section-dot.synthesis { background: var(--gold); }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    flex: 1;
  }

  .section-label.tropical { color: var(--tropical); }
  .section-label.sidereal { color: var(--sidereal); }
  .section-label.synthesis { color: var(--gold); }

  .section-title {
    font-size: 28px;
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    margin-bottom: 20px;
  }

  .reading-content {
    font-size: 18px;
    line-height: 1.8;
    color: var(--text);
    font-weight: 300;
  }

  .reading-content p {
    margin-bottom: 16px;
  }

  .reading-content strong {
    color: var(--cream);
    font-weight: 600;
  }

  .reading-content em {
    color: var(--gold-light);
    font-style: italic;
  }

  /* SYNTHESIS SPECIAL */
  .synthesis-card {
    background: var(--surface);
    border: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 2px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  .synthesis-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top right, rgba(201, 168, 76, 0.05), transparent 60%);
    pointer-events: none;
  }

  /* CONVERGENCE MARKERS */
  .signal-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .signal-row:last-child { border-bottom: none; }

  .signal-tropical {
    font-size: 15px;
    color: var(--tropical);
    text-align: right;
  }

  .signal-sidereal {
    font-size: 15px;
    color: var(--sidereal);
  }

  .signal-connector {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    text-align: center;
  }

  .signal-connector.agree {
    background: rgba(201, 168, 76, 0.15);
    color: var(--gold);
    border: 1px solid rgba(201, 168, 76, 0.3);
  }

  .signal-connector.tension {
    background: rgba(255, 120, 120, 0.1);
    color: #FF9090;
    border: 1px solid rgba(255, 120, 120, 0.2);
  }

  /* ASPECT PILLS */
  .aspect-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0;
  }

  .aspect-pill {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid;
  }

  .aspect-pill.conjunction { border-color: rgba(123, 159, 224, 0.4); color: var(--tropical); }
  .aspect-pill.trine { border-color: rgba(201, 168, 76, 0.4); color: var(--gold); }
  .aspect-pill.opposition { border-color: rgba(224, 123, 159, 0.4); color: var(--sidereal); }
  .aspect-pill.square { border-color: rgba(255, 150, 100, 0.4); color: #FF9664; }
  .aspect-pill.sextile { border-color: rgba(100, 200, 180, 0.4); color: #64C8B4; }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 40px 0;
    color: var(--text-dim);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201, 168, 76, 0.1);
  }

  /* ERROR */
  .error-msg {
    background: rgba(255, 100, 100, 0.1);
    border: 1px solid rgba(255, 100, 100, 0.3);
    color: #FF9090;
    padding: 16px 20px;
    font-size: 16px;
    margin-top: 16px;
    display: none;
  }

  .error-msg.active { display: block; }

  /* AUTOCOMPLETE */
  .autocomplete-wrapper { position: relative; }

  .autocomplete-dropdown {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-top: none;
    z-index: 100;
    max-height: 220px;
    overflow-y: auto;
    display: none;
  }

  .autocomplete-dropdown.open { display: block; }

  .autocomplete-item {
    padding: 11px 16px;
    font-size: 16px;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.active {
    background: rgba(201, 168, 76, 0.1);
    color: var(--cream);
  }

  .autocomplete-item .city-flag {
    font-size: 18px;
    flex-shrink: 0;
  }

  .autocomplete-item .city-info { display: flex; flex-direction: column; }
  .autocomplete-item .city-name { font-size: 16px; }
  .autocomplete-item .city-country {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .autocomplete-loading {
    padding: 12px 16px;
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .planet-grid { grid-template-columns: repeat(2, 1fr); }
    .form-card { padding: 24px; }
    .tagline { font-size: 24px; }
  }

  /* TYPEWRITER EFFECT */
  .typewriter { border-right: 2px solid var(--gold); animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { border-color: transparent; } }

  /* SCROLL REVEAL */
  .reveal { opacity: 0; transform: translateY(24px); transition: all 0.7s ease; }
  .reveal.in { opacity: 1; transform: none; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="container">
  <header>
    <span class="logo-symbol">✦</span>
    <h1>AXIS</h1>
    <div class="tagline">Where <span>two skies</span> tell one truth</div>
  </header>

  <div class="form-card reveal" id="formCard">
    <div class="form-grid">
      <div class="form-group full">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Paste your key from aistudio.google.com" />
      </div>
      <div class="form-group full">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="dob" />
      </div>
      <div class="form-group">
        <label>Time of Birth</label>
        <input type="time" id="tob" />
      </div>
      <div class="form-group full">
        <label>Place of Birth</label>
        <div class="autocomplete-wrapper">
          <input type="text" id="pob" placeholder="Start typing a city..." autocomplete="off" oninput="handleCityInput(this.value)" onkeydown="handleCityKeydown(event)" onfocus="if(this.value.length>=2) openDropdown()" onblur="setTimeout(closeDropdown, 200)" />
          <div class="autocomplete-dropdown" id="cityDropdown"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Ayanamsa (Sidereal)</label>
        <select id="ayanamsa">
          <option value="Lahiri">Lahiri (Standard Vedic)</option>
          <option value="Raman">Raman</option>
          <option value="Krishnamurti">Krishnamurti (KP)</option>
          <option value="Fagan-Bradley">Fagan-Bradley (Western Sidereal)</option>
          <option value="Yukteshwar">Yukteshwar</option>
        </select>
      </div>
      <div class="form-group">
        <label>House System</label>
        <select id="houseSystem">
          <option value="Placidus">Placidus</option>
          <option value="Whole Sign" selected>Whole Sign</option>
          <option value="Koch">Koch</option>
          <option value="Equal House">Equal House</option>
          <option value="Porphyry">Porphyry</option>
        </select>
      </div>
    </div>
    <button class="btn-generate" id="generateBtn" onclick="generateChart()">
      <span>Cast the Chart</span>
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="loading" id="loading">
    <div class="orbital">
      <div class="orbital-ring"></div>
      <div class="orbital-ring"></div>
      <div class="orbital-ring"></div>
    </div>
    <div class="loading-text">Reading the celestial record</div>
    <div class="loading-phase" id="loadingPhase">Calculating planetary positions...</div>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
// STARFIELD
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = Array.from({length: 180}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.2,
  o: Math.random() * 0.5 + 0.1,
  d: Math.random() * 4 + 2
}));

let t = 0;
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  t += 0.01;
  stars.forEach(s => {
    const o = s.o * (0.5 + 0.5 * Math.sin(t / s.d + s.x));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${o})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Scroll reveal
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// PLANET SYMBOLS
const planetSymbols = {
  'Sun': '☉', 'Moon': '☽', 'Mercury': '☿', 'Venus': '♀', 'Mars': '♂',
  'Jupiter': '♃', 'Saturn': '♄', 'Uranus': '♅', 'Neptune': '♆', 'Pluto': '♇',
  'Ascendant': 'AC', 'Midheaven': 'MC', 'North Node': '☊', 'Chiron': '⚷'
};

// LOADING PHASES
const phases = [
  "Calculating planetary positions...",
  "Mapping Tropical zodiac...",
  "Applying Sidereal ayanamsa...",
  "Computing house cusps...",
  "Identifying aspects & dignities...",
  "Weaving the Tropical reading...",
  "Channeling the Vedic interpretation...",
  "Finding convergence & tension...",
  "Synthesizing your cosmic blueprint..."
];

function cyclePhases() {
  let i = 0;
  return setInterval(() => {
    document.getElementById('loadingPhase').textContent = phases[i % phases.length];
    i++;
  }, 2200);
}

async function generateChart() {
  const name = document.getElementById('name').value.trim();
  const dob = document.getElementById('dob').value;
  const tob = document.getElementById('tob').value;
  const pob = document.getElementById('pob').value.trim();
  const ayanamsa = document.getElementById('ayanamsa').value;
  const houseSystem = document.getElementById('houseSystem').value;
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.classList.remove('active');

  const apiKey = document.getElementById('apiKey').value.trim();

  if (!apiKey) {
    errorMsg.textContent = 'Please enter your Gemini API key. Get one free at aistudio.google.com';
    errorMsg.classList.add('active');
    return;
  }

  if (!name || !dob || !tob || !pob) {
    errorMsg.textContent = 'Please fill in all fields to cast your chart.';
    errorMsg.classList.add('active');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;

  document.getElementById('loading').classList.add('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('results').innerHTML = '';

  const phaseInterval = cyclePhases();

  const date = new Date(dob);
  const [year, month, day] = [date.getFullYear(), date.getMonth() + 1, date.getDate()];
  const [hour, minute] = tob.split(':').map(Number);

  // Build the mega-prompt
  const systemPrompt = `You are AXIS, the world's most sophisticated dual-system astrologer. You have mastered both Western Tropical astrology and Vedic Jyotish (Sidereal) at the highest level. You speak with authority, depth, and poetic precision. You do NOT give generic horoscope-style platitudes. Every statement you make is grounded in the specific planetary positions, aspects, and house placements provided.

You will receive birth data and your job is to:
1. Calculate approximate planetary positions (use your knowledge of ephemeris and typical planetary speeds — be specific with degrees and signs)
2. Apply the ${ayanamsa} ayanamsa (~23.5° difference) to produce Sidereal positions  
3. Identify key aspects (conjunctions, trines, squares, oppositions, sextiles within 8° orb)
4. Generate three layered readings

Your output MUST be valid JSON matching this exact structure:
{
  "planets": [
