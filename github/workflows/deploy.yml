name: Extract and Deploy

on:
  push:
    paths:
      - '**.zip'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract zip
        run: |
          unzip -o axis-astro-deploy.zip -d extracted
          cp -r extracted/. .
          rm -rf extracted axis-astro-deploy.zip

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Extract and deploy AXIS app" || echo "Nothing to commit"
          git push
